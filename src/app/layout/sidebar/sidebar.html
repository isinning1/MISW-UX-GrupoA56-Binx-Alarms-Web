<aside class="sidebar" aria-label="Navegación principal">
  <div class="sidebar__brand" aria-label="BINX">
    <div class="sidebar__brand-logo">
      <span>B</span>
      <span>I</span>
      <span>N</span>
      <span>X</span>
    </div>
    <div class="sidebar__brand-icon" aria-hidden="true">
      <i class="bi bi-bell"></i>
    </div>
  </div>

  <nav class="sidebar__nav">
    @for (item of items; track item.route) {
      <a
        class="sidebar__item"
        [routerLink]="item.route"
        routerLinkActive="sidebar__item--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="sidebar__icon-wrapper" aria-hidden="true">
          <i class="bi sidebar__icon" [ngClass]="item.icon"></i>
        </span>

        <span class="sidebar__label">
          {{ item.label }}
        </span>
      </a>
    }
  </nav>
</aside>
