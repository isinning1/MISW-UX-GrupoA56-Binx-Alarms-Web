<section class="login-page">
  <div class="login-card">
    <div class="login-card__hero">
      <div class="login-card__circle"></div>

      <div class="login-card__brand">BINX</div>

      <div class="login-card__icon" aria-hidden="true">
        <i class="bi bi-bell-fill"></i>
      </div>

      <h1 class="login-card__title">Inicio de Sesión</h1>
      <p class="login-card__subtitle">
        Controla tus alarmas y organiza tu rutina diaria.
      </p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="login-form__field">
        <label class="login-form__label" for="username">Usuario</label>
        <input
          id="username"
          name="username"
          type="text"
          class="binx-input"
          [(ngModel)]="username"
          placeholder="Ingresa tu usuario"
          autocomplete="username"
        />
      </div>

      <div class="login-form__field">
        <label class="login-form__label" for="password">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          class="binx-input"
          [(ngModel)]="password"
          placeholder="Ingresa tu contraseña"
          autocomplete="current-password"
        />
      </div>

      <label class="login-form__remember">
        <input
          type="checkbox"
          name="rememberMe"
          [(ngModel)]="rememberMe"
        />
        <span>Recordarme</span>
      </label>

      <button type="submit" class="binx-btn binx-btn-primary binx-btn-block">
        Ingresar
      </button>
    </form>
  </div>
</section>
