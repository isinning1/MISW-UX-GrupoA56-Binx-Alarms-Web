<section class="login-page">
  <div class="login-card">
    <div class="login-card__hero" aria-hidden="true">
      <div class="login-card__circle"></div>

      <div class="login-card__brand" aria-label="BINX">
        <span>B</span>
        <span>I</span>
        <span>N</span>
        <span>X</span>
      </div>

      <div class="login-card__icon">
        <i class="bi bi-bell"></i>
      </div>
    </div>

    <div class="login-card__heading">
      <h1 class="login-card__title">Inicio de Sesión</h1>
      <p class="login-card__subtitle">
        Ingresa tu usuario y contraseña aquí para empezar
      </p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="login-form__field">
        <label class="login-form__label" for="username">Usuario</label>
        <input
          id="username"
          name="username"
          type="text"
          class="binx-input"
          [(ngModel)]="username"
          placeholder="Ingresa tu usuario"
          autocomplete="username"
          aria-label="Usuario"
          title="Usuario"
        />
      </div>

      <div class="login-form__field">
        <label class="login-form__label" for="password">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          class="binx-input"
          [(ngModel)]="password"
          placeholder="Contraseña"
          autocomplete="current-password"
          aria-label="Contraseña"
          title="Contraseña"
        />
      </div>

      <label class="login-form__remember" for="rememberMe">
        <input
          id="rememberMe"
          type="checkbox"
          name="rememberMe"
          [(ngModel)]="rememberMe"
          aria-label="Recordarme"
          title="Recordarme"
        />
        <span>Recordarme</span>
      </label>

      <button
        type="submit"
        class="binx-btn binx-btn-primary binx-btn-block"
      >
        Iniciar Sesión
      </button>
    </form>
  </div>
</section>
